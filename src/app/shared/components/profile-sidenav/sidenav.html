<nz-layout class="app-layout">

  <!-- ═══════════════════════════════════════════
       SIDEBAR
  ════════════════════════════════════════════ -->
  <nz-sider
    class="menu-sidebar"
    nzCollapsible
    nzWidth="256px"
    nzBreakpoint="md"
    [(nzCollapsed)]="isCollapsed"
    [nzTrigger]="null"
  >

    <!-- ── User Header ── -->
    <app-user-header [isCollapsed]="isCollapsed"></app-user-header>

    <!-- ── Back + Section Title ── -->
    <div class="section-header" [class.collapsed]="isCollapsed">
      <button
        class="back-btn"
        (click)="goBack()"
        nz-tooltip
        [nzTooltipTitle]="isCollapsed ? 'Back' : ''"
        nzTooltipPlacement="right"
      >
        <span nz-icon nzType="left" nzTheme="outline" class="back-icon"></span>
      </button>
      <span class="section-title" *ngIf="!isCollapsed">Accounts</span>
    </div>

    <!-- ── Nav Menu ── -->
    <ul
      nz-menu
      nzTheme="light"
      nzMode="inline"
      [nzInlineCollapsed]="isCollapsed"
      class="nav-menu"
    >
      <li
        *ngFor="let item of menuItems"
        nz-menu-item
        nzMatchRouter
        nz-tooltip
        [nzTooltipTitle]="isCollapsed ? item.label : ''"
        nzTooltipPlacement="right"
      >
        <a [routerLink]="item.link" routerLinkActive="active-link">
          <span nz-icon [nzType]="item.icon" nzTheme="outline"></span>
          <span *ngIf="!isCollapsed">{{ item.label }}</span>
        </a>
      </li>
    </ul>

    <!-- ── Spacer ── -->
    <div class="spacer"></div>

    <!-- ── Logout Button ── -->
    <div class="logout-wrap" [class.collapsed]="isCollapsed">
      <button
        nz-button
        nzType="primary"
        class="logout-btn"
        nz-tooltip
        [nzTooltipTitle]="isCollapsed ? 'Logout' : ''"
        nzTooltipPlacement="right"
        (click)="logout()"
      >
        <span nz-icon nzType="poweroff" nzTheme="outline"></span>
        <span *ngIf="!isCollapsed">Logout</span>
      </button>
    </div>

    <!-- ── Collapse Trigger ── -->
    <div class="collapse-trigger" (click)="toggleCollapse()">
      <span
        nz-icon
        [nzType]="isCollapsed ? 'menu-unfold' : 'menu-fold'"
        nzTheme="outline"
        class="trigger-icon"
      ></span>
      <span class="trigger-label" *ngIf="!isCollapsed">Collapse</span>
    </div>

  </nz-sider>

  <!--  MAIN CONTENT  (header + router-outlet)-->
  <nz-layout class="!bg-white">
    <nz-header>
      <div class="app-header">
        <!-- Collapse toggle in header (mirrors original) -->
        <span class="header-trigger" (click)="toggleCollapse()">
          <span
            nz-icon
            class="trigger"
            [nzType]="isCollapsed ? 'menu-unfold' : 'menu-fold'"
            nzTheme="outline"
          ></span>
        </span>
      </div>
    </nz-header>

    <nz-content>
      <div class="inner-content">
        <router-outlet></router-outlet>
      </div>
    </nz-content>
  </nz-layout>

</nz-layout>
