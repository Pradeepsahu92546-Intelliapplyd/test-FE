<nz-layout class="app-layout">

  <!--  
       SIDEBAR
    -->
  <nz-sider
    class="menu-sidebar"
    nzCollapsible
    nzWidth="240px"
    nzBreakpoint="md"
    [(nzCollapsed)]="isCollapsed"
    [nzTrigger]="null"
  >
    <!-- ── User Header ── -->
    <app-user-header [isCollapsed]="isCollapsed"></app-user-header>
    <!-- Top-right notification icons (only expanded) -->
    <!-- <div class="header-actions" *ngIf="!isCollapsed">
      <nz-badge [nzCount]="9" nzSize="small">
        <span nz-icon nzType="message" nzTheme="outline" class="notif-icon"></span>
      </nz-badge>
      <nz-badge [nzCount]="9" nzSize="small">
        <span nz-icon nzType="bell" nzTheme="outline" class="notif-icon"></span>
      </nz-badge>
    </div> -->

    <!-- ── Unit Filter (back arrow + unit selector) ── -->
    <div class="unit-filter-row" [class.collapsed]="isCollapsed">
      <!-- Back arrow -->
      <button class="back-btn" (click)="goBack()"
              nz-tooltip [nzTooltipTitle]="isCollapsed ? 'Dashboard' : ''" nzTooltipPlacement="right">
        <span nz-icon nzType="left" nzTheme="outline"></span>
      </button>

      <!-- Unit dropdown selector (expanded only) -->
      <div class="unit-selector" *ngIf="!isCollapsed">
        <nz-avatar nzSize="small" nzText="U" class="unit-avatar"></nz-avatar>
        <nz-select
          [(ngModel)]="selectedUnitId"
          (ngModelChange)="onUnitChange($event)"
          class="unit-select"
          nzBorderless
        >
          <nz-option nzValue="all" nzLabel="All units"></nz-option>
          <nz-option *ngFor="let u of units" [nzValue]="u.id" [nzLabel]="u.name"></nz-option>
        </nz-select>
      </div>
    </div>

    <!-- ── Navigation Menu ── -->
    <ul nz-menu nzTheme="light" nzMode="inline" [nzInlineCollapsed]="isCollapsed" class="nav-menu">

      <!-- Units -->
      <li nz-menu-item nzMatchRouter
          nz-tooltip [nzTooltipTitle]="isCollapsed ? 'Units' : ''" nzTooltipPlacement="right">
        <a routerLink="units" routerLinkActive="active-link">
          <span nz-icon nzType="code-sandbox" nzTheme="outline"></span>
          <span *ngIf="!isCollapsed">Units</span>
        </a>
      </li>

      <!-- Teams and member -->
      <li nz-menu-item nzMatchRouter
          nz-tooltip [nzTooltipTitle]="isCollapsed ? 'Teams and member' : ''" nzTooltipPlacement="right">
        <a routerLink="teams" routerLinkActive="active-link">
          <span nz-icon nzType="team" nzTheme="outline"></span>
          <span *ngIf="!isCollapsed">Teams and member</span>
        </a>
      </li>

      <!-- Permission Access (submenu) -->
      <li nz-submenu
          [nzTitle]="isCollapsed ? '' : 'Permission Access'"
          nzIcon="solution"
          nz-tooltip [nzTooltipTitle]="isCollapsed ? 'Permission Access' : ''" nzTooltipPlacement="right">
        <ul>
          <li nz-menu-item nzMatchRouter>
            <a routerLink="permissions/rules" routerLinkActive="active-link">Rules</a>
          </li>
          <li nz-menu-item nzMatchRouter>
            <a routerLink="permissions/roles" routerLinkActive="active-link">Roles</a>
          </li>
          <li nz-menu-item nzMatchRouter>
            <a routerLink="permissions/resources" routerLinkActive="active-link">Resources</a>
          </li>
        </ul>
      </li>

      <!-- Request to System creation -->
      <li nz-menu-item nzMatchRouter
          nz-tooltip [nzTooltipTitle]="isCollapsed ? 'Request to System creation' : ''" nzTooltipPlacement="right">
        <a routerLink="requests" routerLinkActive="active-link">
          <span nz-icon nzType="plus-square" nzTheme="outline"></span>
          @if(!isCollapsed) {
            <span>Request to System creation</span>
          }
        </a>
      </li>

      <!-- Billings -->
      <li nz-menu-item nzMatchRouter
          nz-tooltip [nzTooltipTitle]="isCollapsed ? 'Billings' : ''" nzTooltipPlacement="right">
        <a routerLink="billings" routerLinkActive="active-link">

          <span nz-icon nzType="credit-card" nzTheme="outline"></span>
          @if(!isCollapsed) {
            <span>Billings</span>
          }
        </a>
      </li>

      <!-- Subscription Plan Settings -->
      <li nz-menu-item nzMatchRouter
          nz-tooltip [nzTooltipTitle]="isCollapsed ? 'Subscription Plan Settings' : ''" nzTooltipPlacement="right">
          
        <a routerLink="subscription-lists" routerLinkActive="active-link">
          <span nz-icon nzType="crown" nzTheme="outline"></span>
          @if(!isCollapsed) {
          <span >Subscription Plan Settings</span>
          }
        </a>
    
      </li>

    </ul>

    <div class="spacer"></div>

    <!-- ── Go to System Dashboard Button ── -->
    <div class="dashboard-btn-wrap" [class.collapsed]="isCollapsed">
      <button nz-button nzType="primary" class="dashboard-btn"
              nz-tooltip [nzTooltipTitle]="isCollapsed ? 'System Dashboard' : ''" nzTooltipPlacement="right"
              (click)="navigateToDashboard()">
        <span nz-icon nzType="dashboard" nzTheme="outline"></span>
        <span *ngIf="!isCollapsed">Go to System Dashboard</span>
      </button>
    </div>

    <!-- ── Collapse Trigger ── -->
    <div class="collapse-trigger" (click)="toggleCollapse()">
      <span nz-icon
            [nzType]="isCollapsed ? 'menu-unfold' : 'menu-fold'"
            nzTheme="outline"
            class="trigger-icon">
      </span>
      <span class="trigger-label" *ngIf="!isCollapsed">Collapse</span>
    </div>

  </nz-sider>

  <!--  
       MAIN CONTENT
    -->
  <nz-layout class="main-layout">

    <!-- Top App Header -->
    <nz-header class="app-header">
      <div class="header-inner">
        <!-- Breadcrumb -->
        <div class="breadcrumb">
          <span nz-icon nzType="border" nzTheme="outline" class="bc-prefix-icon"></span>
          <ng-container *ngFor="let bc of breadcrumbs; let last = last; let first = first">
            <a *ngIf="!last && bc.link" [routerLink]="bc.link" class="bc-link">{{ bc.label }}</a>
            <span *ngIf="!last && !bc.link" class="bc-link">{{ bc.label }}</span>
            <span *ngIf="!last" class="bc-sep"> / </span>
            <span *ngIf="last" class="bc-current">{{ bc.label }}</span>
          </ng-container>
        </div>
      </div>
    </nz-header>

    <!-- Inner Content (child routes render here) -->
    <nz-content>
      <div class="inner-content">
        <router-outlet></router-outlet>
      </div>
    </nz-content>

  </nz-layout>
</nz-layout>
