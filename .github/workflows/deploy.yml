name: Build-Push&Deploy-xxx

on:
  pull_request:
    branches: [ main ]  # Runs tests BEFORE merging
  push:
    branches: [ main ]  # Runs deployment AFTER merging

env:
  REGISTRY_NAME: registry.digitalocean.com/dev-services
  repository: full-stack

permissions:
  contents: read
  packages: write

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci
  
      - name: Run Angular Internal Tests
        run: npm run test:ci

      # Optional: Only run build/deploy steps if it is a push to main, not a PR test
      # - name: Build and Push
      #   if: github.event_name == 'push'
      #   run: |
      #     echo "Your build and deployment commands here"
